# Project-wide Gradle settings.

# JVM heap — increase if you get out-of-memory errors during build
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Parallel builds (speeds up multi-module projects)
org.gradle.parallel=true

# Build caching (faster incremental builds)
org.gradle.caching=true

# AndroidX — required, do not remove
android.useAndroidX=true

# Non-transitive R classes — required by AGP 8+ for valid bundle structure
android.nonTransitiveRClass=true

# Suppress deprecated Jetifier warning (we don't use old support libraries)
android.enableJetifier=false

# Kotlin code style
kotlin.code.style=official
