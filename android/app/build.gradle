apply plugin: 'com.android.application'

android {
    namespace = "com.lifer.app"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.lifer.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Java 17 is required when targeting Android 16 (API 36)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ── Signing ────────────────────────────────────────────────
    //
    // HOW TO SET THIS UP:
    //
    // 1. Generate a keystore (run this once in your terminal):
    //      keytool -genkey -v \
    //        -keystore android/app/lifer-release.keystore \
    //        -alias lifer -keyalg RSA -keysize 2048 -validity 10000
    //
    // 2. Create android/keystore.properties with your passwords:
    //      storePassword=YOUR_STORE_PASSWORD
    //      keyPassword=YOUR_KEY_PASSWORD
    //      keyAlias=lifer
    //      storeFile=lifer-release.keystore
    //
    // 3. Uncomment the signingConfigs block below.
    //
    // Alternatively, use Android Studio's guided wizard:
    //   Build → Generate Signed Bundle / APK → Android App Bundle

    // signingConfigs {
    //     release {
    //         def props = new Properties()
    //         props.load(new FileInputStream(rootProject.file('keystore.properties')))
    //         storeFile     file(props['storeFile'])
    //         storePassword props['storePassword']
    //         keyAlias      props['keyAlias']
    //         keyPassword   props['keyPassword']
    //     }
    // }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // signingConfig signingConfigs.release  // uncomment after keystore setup above
        }
        debug {
            // No applicationIdSuffix — keeps package name clean for testing
        }
    }

    // AAB bundle splits: smaller downloads per device
    bundle {
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }

    // Prevent duplicate file errors from transitive dependencies
    packaging {
        resources {
            excludes += [
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                '/META-INF/{AL2.0,LGPL2.1}',
            ]
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}
